<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아이 보호자 연락처</title>
  <style>
    /* --------------------------------------------------- */
    /* 🎨 디자인 영역 (절대 수정하지 마세요!) */
    /* --------------------------------------------------- */
    body { margin: 0; font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif; background: #fdf8eb; color: #333; text-align: center; padding: 20px 10px 80px; }
    .card { max-width: 480px; margin: 0 auto; background: #fff; border-radius: 30px; padding: 30px 20px; box-shadow: 0 12px 35px rgba(0,0,0,0.08); overflow: hidden; position: relative; }
    
    .header { background: linear-gradient(135deg, #ffd84d 0%, #ffc000 100%); margin: -30px -20px 25px; padding: 25px 20px; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; color: #5a3e00; }
    h1 { font-size: 24px; margin: 0; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 6px; }
    
    .photo-area { width: 100%; aspect-ratio: 16 / 9; border-radius: 20px; background: #f4f4f4; margin: 0 auto 25px; overflow: hidden; align-items: center; justify-content: center; border: 4px solid #fff; box-shadow: 0 6px 15px rgba(0,0,0,0.06); position: relative; display: none; /* 기본 숨김 */ }
    .photo-area img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
    
    .instruction { font-size: 17px; line-height: 1.6; color: #e15f41; margin: 0 0 25px; font-weight: 700; background: #ffeeea; padding: 15px; border-radius: 15px; }
    
    .btn-group { display: flex; flex-direction: column; gap: 14px; margin-bottom: 25px; }
    .btn { align-items: center; justify-content: center; gap: 8px; text-decoration: none; padding: 18px; border-radius: 20px; font-size: 20px; font-weight: 800; color: #fff; transition: transform 0.1s, box-shadow 0.1s; box-shadow: 0 6px 15px rgba(0,0,0,0.12); display: none; /* 기본 숨김 */ }
    .btn:active { transform: scale(0.98); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .btn.primary { background: linear-gradient(135deg, #ff7e67 0%, #ff5252 100%); }
    .btn.secondary { background: linear-gradient(135deg, #4aabff 0%, #1e90ff 100%); }
    
    .info-box { background: #fdfdfd; border-radius: 20px; padding: 22px; text-align: left; font-size: 16px; line-height: 1.8; color: #444; border: 2px solid #f0f0f0; }
    .info-box strong { color: #5a3e00; display: inline-block; width: 75px; font-weight: 700; }
    .info-box p { margin: 6px 0; display: flex; align-items: center; }
    .info-box span { display: inline-block; color: #111; font-weight: 600; }
    
    .other-contact { align-items: center; justify-content: center; gap: 8px; background: #2bcbba; color: #fff; text-decoration: none; padding: 15px; border-radius: 15px; font-weight: 800; margin-top: 20px; font-size: 16px; box-shadow: 0 4px 10px rgba(43,203,186,0.3); display: none; /* 기본 숨김 */ }
    .other-contact:active { transform: scale(0.98); }
    
    .thanks { font-size: 14px; color: #777; margin-top: 20px; text-align: center; display: block; width: 100%; line-height: 1.6; font-weight: 500; }
    
    .footer-link { text-decoration: none; display: block; -webkit-tap-highlight-color: transparent; }
    .footer-credit { margin-top: 35px; border-top: 2px dashed #eee; padding-top: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; color: #aaa; font-weight: 600; transition: color 0.2s; }
    .footer-credit svg { width: 16px; height: 16px; fill: #aaa; transition: fill 0.2s; }
    .footer-link:hover .footer-credit, .footer-link:active .footer-credit { color: #03c75a; }
    .footer-link:hover .footer-credit svg, .footer-link:active .footer-credit svg { fill: #03c75a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header"><h1>🚨 아이 보호자 연락처 🧸</h1></div>

    <div class="photo-area" id="ui-photo-area">
      <img id="ui-photo" src="" alt="아이 사진">
    </div>

    <p class="instruction">아이에게 도움이 필요해 보인다면<br>아래 버튼으로 전화 부탁드립니다.<br>💛 감사합니다 💛</p>

    <div class="btn-group">
      <a class="btn primary" id="ui-btn-mom" href="#">👩 엄마에게 전화하기 📱</a>
      <a class="btn secondary" id="ui-btn-dad" href="#">👨 아빠에게 전화하기 📱</a>
    </div>

    <div class="info-box">
      <p><strong>아이이름:</strong> <span id="ui-name"></span></p>
      <p><strong>생년월일:</strong> <span id="ui-birth"></span></p>
      <p><strong>혈액형:</strong> <span id="ui-blood"></span></p>
      <p><strong>알러지:</strong> <span id="ui-allergy"></span></p>
      
      <a class="other-contact" id="ui-btn-other" href="#">👵 보호자 외 연락처 📱</a>
      
      <span class="thanks">늦은 시간이나 사소한 일이라도 괜찮습니다.<br>아이가 혼자 있다면 망설이지 말고 꼭 연락해 주세요.<br>당신의 작은 관심이 큰 도움이 됩니다. 🙏</span>
    </div>

    <a href="https://smartstore.naver.com/orol_xx" target="_blank" class="footer-link">
      <div class="footer-credit">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
          <path d="M160 112c0-35.3 28.7-64 64-64s64 28.7 64 64v48H160V112zm-48 48H48c-26.5 0-48 21.5-48 48V416c0 53 43 96 96 96H352c53 0 96-43 96-96V208c0-26.5-21.5-48-48-48H336V112C336 50.1 285.9 0 224 0S112 50.1 112 112v48zm24 48a24 24 0 1 1 0 48 24 24 0 1 1 0-48zm152 24a24 24 0 1 1 48 0 24 24 0 1 1 -48 0z"/>
        </svg>
        <span>노댕제작소 | 우리아이지킴이</span>
      </div>
    </a>
  </div>

  <script>
    /* ========================================================================= */
    /* 💡💡💡 [사장님 전용: 여기서부터 고객 정보 입력] 💡💡💡                      */
    /* ========================================================================= */
    /*
       사용법: 쌍따옴표("") 사이에 고객이 적어준 내용을 넣으세요.
       주의: 만약 고객이 "사진 빼주세요", "아빠 번호는 없어요" 라고 하면
             안에 글씨를 완전히 지워서 "" 이렇게 비워두시면 화면에서 자동으로 사라집니다!
    */
    
    const CUSTOMER_DATA = {

      // 1️⃣ 사진 인터넷 주소 (URL)
      // 안 넣으려면 "" 라고만 두세요.
      photoUrl: "https://via.placeholder.com/400x225/f0f0f0/aaaaaa?text=Photo+Area",
      
      // 2️⃣ 연락처 (숫자만 입력해 주세요!)
      // 번호가 하나밖에 없다면 남은 칸은 "" 로 비워두시면 버튼이 감쪽같이 사라집니다.
      momPhone: "01011112222",     // 엄마 번호
      dadPhone: "01033334444",     // 아빠 번호
      otherPhone: "01055556666",   // 기타 보호자 번호
      
      // 3️⃣ 아이 기본 정보
      childName: "김우주 (남아)",
      childBirth: "2020년 05월 05일생",
      childBlood: "O+",
      childAllergy: "땅콩 알러지 있음"

    };
    /* ========================================================================= */
    /* 🚫 여기서부터는 건드리지 마세요! (자동 그리기 로직)                           */
    /* ========================================================================= */
    window.onload = function() {
      // 사진이 있으면 보여주고, 없으면 계속 숨김
      if (CUSTOMER_DATA.photoUrl !== "") {
        document.getElementById("ui-photo-area").style.display = "flex";
        document.getElementById("ui-photo").src = CUSTOMER_DATA.photoUrl;
      }
      // 엄마 번호가 있으면 버튼 활성화
      if (CUSTOMER_DATA.momPhone !== "") {
        document.getElementById("ui-btn-mom").style.display = "flex";
        document.getElementById("ui-btn-mom").href = "tel:" + CUSTOMER_DATA.momPhone;
      }
      // 아빠 번호가 있으면 버튼 활성화
      if (CUSTOMER_DATA.dadPhone !== "") {
        document.getElementById("ui-btn-dad").style.display = "flex";
        document.getElementById("ui-btn-dad").href = "tel:" + CUSTOMER_DATA.dadPhone;
      }
      // 기타 번호가 있으면 버튼 활성화
      if (CUSTOMER_DATA.otherPhone !== "") {
        document.getElementById("ui-btn-other").style.display = "flex";
        document.getElementById("ui-btn-other").href = "tel:" + CUSTOMER_DATA.otherPhone;
      }
      // 텍스트 정보 입력
      document.getElementById("ui-name").innerText = CUSTOMER_DATA.childName;
      document.getElementById("ui-birth").innerText = CUSTOMER_DATA.childBirth;
      document.getElementById("ui-blood").innerText = CUSTOMER_DATA.childBlood;
      document.getElementById("ui-allergy").innerText = CUSTOMER_DATA.childAllergy;
    }
  </script>
</body>
</html>
