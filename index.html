<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아이 보호자 연락처</title>
  <style>
    /* 기본 스타일 설정 */
    body { margin: 0; font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif; background: #eef2f5; color: #333; text-align: center; padding: 20px 10px 80px; }
    .card { max-width: 480px; margin: 0 auto; background: #fff; border-radius: 25px; padding: 30px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); overflow: hidden; position: relative; }

    /* 헤더 스타일 */
    .header { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); margin: -30px -20px 25px; padding: 25px 20px; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; color: #2c3e50; }
    h1 { font-size: 26px; margin: 0; font-weight: 700; display: flex; align-items: center; justify-content: center; }
    h1::before { content: '🚨'; margin-right: 8px; font-size: 24px; }

    /* 🔥 가족사진 공간 - 16:9 비율로 시원하게 확대 */
    .photo-area {
      width: 100%; /* 카드 너비에 꽉 차게 */
      aspect-ratio: 16 / 9; /* 16:9 비율 설정 */
      border-radius: 15px; /* 원형에서 부드러운 직사각형으로 변경 */
      background: #f0f0f0;
      margin: 0 auto 25px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 3px solid #fff; /* 테두리를 약간 얇게 조정 */
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      cursor: pointer;
    }
    .photo-area img { width: 100%; height: 100%; object-fit: cover; }
    .photo-area span { font-size: 15px; /* 약간 키움 */ color: #888; text-align: center; line-height: 1.4; padding: 10px; }

    /* 안내 문구 및 버튼 스타일 */
    .instruction { font-size: 17px; line-height: 1.6; color: #555; margin: 0 0 25px; font-weight: 500; }
    .btn-group { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
    .btn { display: flex; align-items: center; justify-content: center; text-decoration: none; padding: 18px; border-radius: 15px; font-size: 20px; font-weight: 700; color: #fff; transition: background 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .btn.primary { background: #e74c3c; }
    .btn.secondary { background: #34495e; }

    /* 아이 정보 박스 */
    .info-box { background: #f8f9fa; border-radius: 20px; padding: 22px; text-align: left; font-size: 16px; line-height: 1.8; color: #444; border: 1px solid #e1e8ed; }
    .info-box strong { color: #2c3e50; display: inline-block; width: 75px; font-weight: 600; }
    .info-box p { margin: 5px 0; }
    .info-box .other-contact { display: block; background: #95a5a6; color: #fff; text-decoration: none; text-align: center; padding: 12px; border-radius: 10px; font-weight: 700; margin-top: 15px; font-size: 15px; }
    .thanks { font-size: 14px; color: #777; margin-top: 15px; text-align: center; display: block; width: 100%; line-height: 1.5; }

    /* 관리자 버튼 */
    .admin-controls { margin-top: 30px; border-top: 1px solid #eee; padding-top: 15px; text-align: right; }
    .btn-admin { font-size: 13px; color: #aaa; background: none; border: none; cursor: pointer; text-decoration: underline; padding: 0; }

    /* 하단 고정 수정 패널 */
    #editor-panel {
      display: none; position: fixed; bottom: 0; left: 0; width: 100%;
      background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px);
      box-shadow: 0 -5px 20px rgba(0,0,0,0.15); z-index: 1000;
      padding: 15px 20px; box-sizing: border-box;
    }
    .editor-container { max-width: 480px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    .editor-msg { font-size: 14px; font-weight: bold; color: #e74c3c; animation: blink 1.5s infinite; }
    @keyframes blink { 50% { opacity: 0.5; } }
    .editor-btns { display: flex; gap: 8px; }
    .btn-save { background: #27ae60; color: #fff; border: none; padding: 10px 18px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 15px; }
    .btn-close { background: #95a5a6; color: #fff; border: none; padding: 10px 18px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 15px; }

    /* 수정 가능한 요소 시각적 표시 */
    [contenteditable="true"] { outline: 2px dashed #3498db; background: rgba(52, 152, 219, 0.1); border-radius: 4px; padding: 2px 4px; display: inline-block; min-width: 30px; }
    [contenteditable="true"]:focus { outline: 2px solid #e74c3c; background: rgba(231, 76, 60, 0.1); }

    /* 전화번호 전용 입력칸 (수정 모드일 때만 보임) */
    .edit-tel { display: none; margin-top: 8px; }
    body.edit-mode .edit-tel { display: block; }
    .edit-tel input { width: 100%; padding: 12px; border-radius: 10px; border: 2px dashed #e74c3c; font-size: 16px; text-align: center; color: #e74c3c; font-weight: bold; box-sizing: border-box; outline: none; background: #fffaf9; }
    .edit-tel input::placeholder { color: #ffa8a0; font-weight: normal; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1 id="text-title" contenteditable="false">아이 보호자 연락</h1>
    </div>

    <div class="photo-area" onclick="handlePhotoClick()">
      <span id="photo-placeholder">가족사진 (터치해서 등록)</span>
      <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="loadPhoto(event)">
    </div>

    <p class="instruction" id="text-instruction" contenteditable="false">아이를 발견하셨다면 아래 버튼을 눌러<br>보호자에게 연락해주세요.</p>

    <div class="btn-group">
      <div>
        <a class="btn primary" id="btn-mom" href="tel:01089157831"><span id="text-mom" contenteditable="false">📞 엄마에게 전화하기</span></a>
        <div class="edit-tel"><input type="tel" id="input-tel-mom" value="01089157831" placeholder="엄마 전화번호 (숫자만 입력)"></div>
      </div>
      <div>
        <a class="btn secondary" id="btn-dad" href="tel:01099901733"><span id="text-dad" contenteditable="false">📞 아빠에게 전화하기</span></a>
        <div class="edit-tel"><input type="tel" id="input-tel-dad" value="01099901733" placeholder="아빠 전화번호 (숫자만 입력)"></div>
      </div>
    </div>

    <div class="info-box">
      <p><strong>아이이름:</strong> <span id="text-name" contenteditable="false">노하준 Noh Ha Jun (남아)</span></p>
      <p><strong>생년월일:</strong> <span id="text-birth" contenteditable="false">2024년 06월 29일생</span></p>
      <p><strong>혈액형:</strong> <span id="text-blood" contenteditable="false">A+</span></p>
      <p><strong>알러지:</strong> <span id="text-allergy" contenteditable="false">없음</span></p>
      
      <div>
        <a class="other-contact" id="btn-grandma" href="tel:01020717831"><span id="text-grandma" contenteditable="false">📞 보호자 외 연락처</span></a>
        <div class="edit-tel"><input type="tel" id="input-tel-grandma" value="01020717831" placeholder="추가 연락처 번호 (숫자만 입력)"></div>
      </div>
      
      <span class="thanks" id="text-thanks" contenteditable="false">아이에게 도움이 필요해 보인다면 위 번호로 전화or문자 부탁드립니다. 감사합니다.</span>
    </div>

    <div class="admin-controls">
      <button class="btn-admin" onclick="showAdminPrompt()">관리</button>
    </div>
  </div>

  <div id="editor-panel">
    <div class="editor-container">
      <span class="editor-msg">✏️ 점선 박스를 터치하여 수정</span>
      <div class="editor-btns">
        <button class="btn-close" onclick="cancelEdits()">취소</button>
        <button class="btn-save" onclick="saveEdits()">저장</button>
      </div>
    </div>
  </div>

  <script>
    // 사진 등록 처리
    function handlePhotoClick() {
      if (document.body.classList.contains('edit-mode')) {
        document.getElementById('file-input').click();
      }
    }

    // 사진 로드 및 저장
    function loadPhoto(event) {
      var reader = new FileReader();
      reader.onload = function(){
        var output = document.getElementById('photo-placeholder');
        output.innerHTML = '<img src="' + reader.result + '" alt="가족 사진" id="family-photo">';
        localStorage.setItem('familyPhoto', reader.result);
      };
      if(event.target.files[0]) reader.readAsDataURL(event.target.files[0]);
    }

    // 초기 데이터 불러오기
    window.onload = function() {
      var savedPhoto = localStorage.getItem('familyPhoto');
      if (savedPhoto) {
        var output = document.getElementById('photo-placeholder');
        output.innerHTML = '<img src="' + savedPhoto + '" alt="가족 사진" id="family-photo">';
      }

      // 텍스트 불러오기
      const editableElements = [
        'text-title', 'text-instruction', 'text-mom', 'text-dad',
        'text-name', 'text-birth', 'text-blood', 'text-allergy',
        'text-grandma', 'text-thanks'
      ];
      editableElements.forEach(id => {
        const savedText = localStorage.getItem(id);
        if (savedText) document.getElementById(id).innerText = savedText;
      });

      // 저장된 전화번호 불러오기 및 셋팅
      const telKeys = ['mom', 'dad', 'grandma'];
      telKeys.forEach(key => {
        const savedTel = localStorage.getItem('tel-' + key);
        if (savedTel) {
          document.getElementById('btn-' + key).href = 'tel:' + savedTel;
          document.getElementById('input-tel-' + key).value = savedTel;
        }
      });
    }

    // 관리자 비밀번호
    function showAdminPrompt() {
      const password = prompt("관리자 비밀번호를 입력하세요:", "");
      if (password === "0000") {
        showEditor();
      } else if (password !== null) {
        alert("비밀번호가 틀렸습니다.");
      }
    }

    // 편집 모드 켜기
    function showEditor() {
      document.body.classList.add('edit-mode');
      document.getElementById('editor-panel').style.display = 'block';
      
      const editableElements = document.querySelectorAll('[contenteditable="false"]');
      editableElements.forEach(el => el.setAttribute('contenteditable', 'true'));

      // 수정 중에는 버튼이 안 눌리게 임시로 링크 해제
      document.querySelectorAll('.btn, .other-contact').forEach(el => {
        el.setAttribute('data-href', el.getAttribute('href'));
        el.removeAttribute('href');
      });
    }

    // 편집 취소 (새로고침)
    function cancelEdits() {
      if(confirm("수정한 내용을 취소하시겠습니까?")) {
        location.reload();
      }
    }

    // 수정 내용 저장
    function saveEdits() {
      // 1. 텍스트 저장
      const editableElements = [
        'text-title', 'text-instruction', 'text-mom', 'text-dad',
        'text-name', 'text-birth', 'text-blood', 'text-allergy',
        'text-grandma', 'text-thanks'
      ];
      editableElements.forEach(id => {
        localStorage.setItem(id, document.getElementById(id).innerText);
      });

      // 2. 입력된 전화번호만 따로 저장
      const telKeys = ['mom', 'dad', 'grandma'];
      telKeys.forEach(key => {
        let inputVal = document.getElementById('input-tel-' + key).value.replace(/[^0-9]/g, '');
        localStorage.setItem('tel-' + key, inputVal);
        document.getElementById('btn-' + key).setAttribute('href', 'tel:' + inputVal);
      });

      // 편집 모드 종료
      document.body.classList.remove('edit-mode');
      document.getElementById('editor-panel').style.display = 'none';
      const activeElements = document.querySelectorAll('[contenteditable="true"]');
      activeElements.forEach(el => el.setAttribute('contenteditable', 'false'));
      
      alert("성공적으로 저장되었습니다.");
    }
  </script>
</body>
</html>
